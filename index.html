<!DOCTYPE html>
<!-- v10.1 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Podcast Editor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@9.6.1/build/index.umd.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Icons
        const CheckCircle = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const AlertCircle = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const FileAudio = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.5 22h.5a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v3"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <path d="M10 20v-1a2 2 0 1 1 4 0v1a2 2 0 1 1-4 0Z"></path>
                <path d="M6 20v-1a2 2 0 1 0-4 0v1a2 2 0 1 0 4 0Z"></path>
                <path d="M2 19v-3a6 6 0 0 1 12 0v3"></path>
            </svg>
        );

        const Sparkles = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
                <path d="M5 3v4"></path>
                <path d="M19 17v4"></path>
                <path d="M3 5h4"></path>
                <path d="M17 19h4"></path>
            </svg>
        );

        const Download = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const API_URL = 'https://ai-podcast-editor-production.up.railway.app';

        const STAGES = [
            { key: 'uploading',            label: 'Uploading audio' },
            { key: 'combining',            label: 'Aligning & mixing tracks' },
            { key: 'transcribing',         label: 'Transcribing with AssemblyAI' },
            { key: 'filler_assessment',    label: 'Filler assessment' },
            { key: 'detecting',            label: 'Detecting preset...' },
            { key: 'analyzing',            label: 'Analysing with Claude AI' },
            { key: 'cutting',           label: 'Applying edits' },
            { key: 'awaiting_enhance',  label: 'Review enhance settings' },
            { key: 'enhancing',         label: 'Enhancing with Adobe Enhance Speech' },
            { key: 'merging',           label: 'Merging intro & outro' },
            { key: 'mastering',         label: 'Mastering (de-click, limiter, loudness)' },
            { key: 'reviewing',         label: 'Reviewing quality' },
            { key: 'done',              label: 'Complete' },
        ];

        function PodcastEditor() {
            const [screen, setScreen] = useState('upload');
            const [appMode, setAppMode] = useState('edit'); // 'edit' | 'shownotes'
            const [uploadMode, setUploadMode] = useState('single'); // 'single' | 'multi'
            const [transcriptText, setTranscriptText] = useState('');
            const [tracks, setTracks] = useState([]); // [{file, label}]
            const [files, setFiles] = useState([]);
            const [introFile, setIntroFile] = useState(null);
            const [outroFile, setOutroFile] = useState(null);
            const preset = 'auto';
            const [customInstructions, setCustomInstructions] = useState('');
            const [pipelineStage, setPipelineStage] = useState(null);
            const [pipelineProgress, setPipelineProgress] = useState(null);
            const [pipelineError, setPipelineError] = useState(null);
            const downloadBlobRef = useRef(null);
            const transcriptIdRef = useRef(null);
            const editJobIdRef = useRef(null);

            // Batch state
            const [batchIndex, setBatchIndex] = useState(0);
            const [batchResults, setBatchResults] = useState([]);

            // Show notes state
            const [showNotes, setShowNotes] = useState(null);
            const [showNotesLoading, setShowNotesLoading] = useState(false);

            // Enhance approval state (set when pipeline pauses for user to review mix)
            const [enhanceApproval, setEnhanceApproval] = useState(null);

            // Filler assessment state (set when pipeline pauses after transcription)
            const [fillerAssessment, setFillerAssessment] = useState(null);

            // Edit decisions visibility
            const [showEditsIndex, setShowEditsIndex] = useState(null);

            // Show profiles state
            const [profiles, setProfiles] = useState(() => {
                try { return JSON.parse(localStorage.getItem('showProfiles') || '[]'); }
                catch { return []; }
            });
            const [selectedProfile, setSelectedProfile] = useState(null);
            const [showProfileManager, setShowProfileManager] = useState(false);
            const [editingProfileName, setEditingProfileName] = useState(null);

            useEffect(() => {
                localStorage.setItem('showProfiles', JSON.stringify(profiles));
            }, [profiles]);

            // Auto-save custom instructions back to the selected profile
            useEffect(() => {
                if (!selectedProfile) return;
                setProfiles(prev => prev.map(p =>
                    p.id === selectedProfile ? { ...p, customInstructions } : p
                ));
            }, [customInstructions]);

            const selectProfile = (profile) => {
                setSelectedProfile(profile.id);
                setCustomInstructions(profile.customInstructions || '');
            };

            const saveProfile = () => {
                const name = prompt('Show name:');
                if (!name) return;
                const newProfile = {
                    id: crypto.randomUUID(),
                    name,
                    customInstructions,
                    createdAt: Date.now(),
                };
                setProfiles(prev => [...prev, newProfile]);
                setSelectedProfile(newProfile.id);
            };

            const deleteProfile = (id) => {
                setProfiles(prev => prev.filter(p => p.id !== id));
                if (selectedProfile === id) setSelectedProfile(null);
            };

            const renameProfile = (id, newName) => {
                if (!newName) return;
                setProfiles(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
                setEditingProfileName(null);
            };

            const handleFileUpload = (e) => {
                const uploaded = Array.from(e.target.files).filter(f => f.type.includes('audio'));
                if (uploaded.length > 0) setFiles(prev => [...prev, ...uploaded]);
            };

            const removeFile = (index) => {
                setFiles(prev => prev.filter((_, i) => i !== index));
            };

            const addTrack = (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.includes('audio')) return;
                const defaultLabels = ['Host', 'Guest 1', 'Guest 2', 'Guest 3'];
                const label = defaultLabels[tracks.length] || `Track ${tracks.length + 1}`;
                setTracks(prev => [...prev, { file, label }]);
                e.target.value = '';
            };

            const removeTrack = (index) => {
                setTracks(prev => prev.filter((_, i) => i !== index));
            };

            const updateTrackLabel = (index, label) => {
                setTracks(prev => prev.map((t, i) => i === index ? { ...t, label } : t));
            };

            const uploadMultiTrack = async () => {
                setPipelineStage('uploading');
                const formData = new FormData();
                tracks.forEach((t, i) => {
                    formData.append(`track_${i}`, t.file);
                    formData.append(`label_${i}`, t.label);
                });
                const res = await fetch(`${API_URL}/api/upload-multitrack`, { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await safeJson(res);
                    throw { stage: 'uploading', message: err?.error || `Multi-track upload failed (${res.status})` };
                }
                const data = await safeJson(res);
                if (!data?.job_id) throw { stage: 'uploading', message: 'Invalid server response' };
                const jobId = data.job_id;

                // Poll multitrack status
                while (true) {
                    await new Promise(r => setTimeout(r, 3000));
                    let statusRes;
                    try { statusRes = await fetch(`${API_URL}/api/multitrack-status/${jobId}`); }
                    catch { throw { stage: 'combining', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                    if (statusRes.status === 404) throw { stage: 'combining', message: 'Server restarted during processing. Please retry.' };
                    const statusData = await safeJson(statusRes);
                    if (!statusData) continue;
                    if (!statusRes.ok) throw { stage: statusData.status || 'combining', message: statusData.error || 'Multi-track processing failed' };

                    if (statusData.status === 'combining') { setPipelineStage('combining'); setPipelineProgress(null); }
                    if (statusData.status === 'uploading') setPipelineStage('uploading');
                    if (statusData.status === 'transcribing' && statusData.transcript_id) {
                        console.log(`Multi-track ready: ${statusData.transcript_id}`, statusData.alignment);
                        return statusData.transcript_id;
                    }
                }
            };

            const safeJson = async (res) => {
                try { return await res.json(); }
                catch { return null; }
            };

            const processOneEpisode = async (file, existingTranscriptId, isMultitrack = false) => {
                setPipelineError(null);

                let transcript_id, filename;

                if (existingTranscriptId) {
                    // Multi-track: upload+combine already done
                    transcript_id = existingTranscriptId;
                    filename = 'combined_tracks';
                } else {
                    // Single track: upload now
                    setPipelineStage('uploading');
                    const formData = new FormData();
                    formData.append('file', file);
                    const uploadRes = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
                    if (!uploadRes.ok) {
                        const err = await safeJson(uploadRes);
                        throw { stage: 'uploading', message: err?.error || `Upload failed (${uploadRes.status})` };
                    }
                    const uploadData = await safeJson(uploadRes);
                    if (!uploadData?.transcript_id) throw { stage: 'uploading', message: 'Invalid server response — please retry' };
                    transcript_id = uploadData.transcript_id;
                    filename = uploadData.filename;
                }
                transcriptIdRef.current = transcript_id;

                // Stage 2: Transcribe (poll)
                setPipelineStage('transcribing');
                while (true) {
                    await new Promise(r => setTimeout(r, 5000));
                    let statusRes;
                    try { statusRes = await fetch(`${API_URL}/api/transcription-status/${transcript_id}`); }
                    catch { throw { stage: 'transcribing', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                    const statusData = await safeJson(statusRes);
                    if (!statusData) throw { stage: 'transcribing', message: `Server returned invalid response (${statusRes.status})` };
                    if (statusData.status === 'completed') break;
                    if (statusData.status === 'error') {
                        throw { stage: 'transcribing', message: statusData.error || 'Transcription failed' };
                    }
                }

                // Stage 2b: Filler assessment pause
                setPipelineStage('filler_assessment');
                let chosenFillerPct = null;
                try {
                    const assessRes = await fetch(`${API_URL}/api/filler-assessment/${transcript_id}`);
                    if (assessRes.ok) {
                        const assessData = await assessRes.json();
                        // Pause pipeline: wait for user to review and choose filler %
                        chosenFillerPct = await new Promise((resolve) => {
                            setFillerAssessment({ ...assessData, resolve });
                        });
                        setFillerAssessment(null);
                    }
                } catch (e) {
                    console.warn('Filler assessment failed, continuing with default:', e);
                }

                // Stage 3: Claude analysis (with frontend-level retry on overload)
                setPipelineStage('analyzing');
                let editDecisions = [];
                let fillerStats = null;
                let resolvedPreset = preset;
                let lastError = '';
                const analysisBody = JSON.stringify({
                    transcript_id,
                    filename,
                    preset,
                    customInstructions,
                    isMultitrack: isMultitrack,
                    ...(chosenFillerPct != null ? { filler_pct: chosenFillerPct } : {}),
                });

                for (let analysisAttempt = 0; analysisAttempt < 3; analysisAttempt++) {
                    const processRes = await fetch(`${API_URL}/api/process`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: analysisBody
                    });
                    const processData = await safeJson(processRes);
                    if (!processRes.ok) throw { stage: 'analyzing', message: processData?.error || `Analysis failed (${processRes.status})` };
                    const analysisJobId = processData.job_id;
                    if (!analysisJobId) throw { stage: 'analyzing', message: 'No job_id returned' };

                    let retryable = false;
                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        let pollRes;
                        try { pollRes = await fetch(`${API_URL}/api/process-status/${analysisJobId}`); }
                        catch { throw { stage: 'analyzing', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                        if (pollRes.status === 404) throw { stage: 'analyzing', message: 'Server restarted during processing. Please retry.' };
                        const pollData = await safeJson(pollRes);
                        if (!pollData) continue;
                        if (!pollRes.ok) {
                            console.error(`Analysis poll error (${pollRes.status}):`, pollData);
                            if (pollData.retryable) { lastError = pollData.error || 'API overloaded'; retryable = true; break; }
                            throw { stage: 'analyzing', message: pollData.error || 'Analysis failed' };
                        }
                        if (pollData.status === 'detecting') setPipelineStage('detecting');
                        if (pollData.status === 'analyzing') setPipelineStage('analyzing');
                        if (pollData.success) {
                            editDecisions = pollData.edit_decisions || [];
                            fillerStats = pollData.filler_stats || null;
                            if (pollData.detected_preset) {
                                resolvedPreset = pollData.detected_preset;
                                console.log(`Auto-detected preset: ${resolvedPreset}`, pollData.detection_metrics);
                            }
                            break;
                        }
                    }
                    if (editDecisions.length > 0 || !retryable) break;
                    if (analysisAttempt < 2) {
                        console.log(`Claude API error, frontend retry ${analysisAttempt + 1}/3 in 30s: ${lastError}`);
                        await new Promise(r => setTimeout(r, 30000));
                    }
                }
                if (editDecisions.length === 0) throw { stage: 'analyzing', message: lastError || 'No edit decisions were generated. Try again or adjust your recording type.' };

                // Stage 4: Apply cuts (+ optional intro/outro merge) → auto-enhance or manual enhance
                setPipelineStage('cutting');
                const cuts = editDecisions.filter(d => d.start_ms != null && d.end_ms != null);
                const editFormData = new FormData();
                editFormData.append('transcript_id', transcript_id);
                editFormData.append('cuts', JSON.stringify(cuts));
                editFormData.append('preset', resolvedPreset);
                console.log(`edit-audio: isMultitrack=${isMultitrack}, transcript_id=${transcript_id}`);
                if (isMultitrack) editFormData.append('is_multitrack', 'true');
                if (introFile) editFormData.append('intro', introFile);
                if (outroFile) editFormData.append('outro', outroFile);
                const editRes = await fetch(`${API_URL}/api/edit-audio`, {
                    method: 'POST',
                    body: editFormData
                });
                const editData = await safeJson(editRes);
                if (!editRes.ok) throw { stage: 'cutting', message: editData?.error || `Edit job failed (${editRes.status})` };
                const editJobId = editData.job_id;
                editJobIdRef.current = editJobId;

                let completedReview = null;
                while (true) {
                    await new Promise(r => setTimeout(r, 3000));
                    let statusRes;
                    try { statusRes = await fetch(`${API_URL}/api/edit-audio-status/${editJobId}`); }
                    catch { throw { stage: 'cutting', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                    if (statusRes.status === 404) throw { stage: 'cutting', message: 'Server restarted during processing. Please retry.' };
                    const statusData = await safeJson(statusRes);
                    if (!statusData) continue;
                    if (statusData.status === 'awaiting_enhance') {
                        setPipelineStage('awaiting_enhance');
                        // Pause pipeline: wait for user to approve enhance mix
                        const approvedMix = await new Promise((resolve) => {
                            setEnhanceApproval({
                                jobId: editJobId,
                                analysis: statusData.analysis,
                                recommendedMix: statusData.recommended_mix,
                                adjustedMix: { ...statusData.recommended_mix },
                                resolve,
                            });
                        });
                        // POST approval to backend
                        await fetch(`${API_URL}/api/edit-audio-approve/${editJobId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ enhance_mix: approvedMix }),
                        });
                        setEnhanceApproval(null);
                        continue;
                    }
                    if (statusData.status === 'cutting')           setPipelineStage('cutting');
                    if (statusData.status === 'merging')           setPipelineStage('merging');
                    if (statusData.status === 'enhancing')         setPipelineStage('enhancing');
                    if (statusData.status === 'mastering')         setPipelineStage('mastering');
                    if (statusData.status === 'reviewing')         setPipelineStage('reviewing');
                    if (statusData.status === 'completed') {
                        if (statusData.review) completedReview = statusData.review;
                        break;
                    }
                    if (!statusRes.ok) {
                        throw { stage: statusData.failed_step || 'cutting', message: statusData.error || 'Audio processing failed' };
                    }
                }

                const dlRes = await fetch(`${API_URL}/api/edit-audio-download/${editJobId}`);
                if (!dlRes.ok) {
                    const err = await safeJson(dlRes);
                    throw { stage: 'mastering', message: err?.error || 'Download failed' };
                }
                return { blob: await dlRes.blob(), transcriptId: transcript_id, review: completedReview, editDecisions, fillerStats };
            };

            const runFullPipeline = async () => {
                const isMulti = uploadMode === 'multi';
                if (!isMulti && files.length === 0) return;
                if (isMulti && tracks.length < 2) return;
                setScreen('progress');
                setPipelineError(null);
                setBatchResults([]);

                try {
                    if (isMulti) {
                        // Multi-track: combine raw → transcribe → analyse → cut → enhance → finalize
                        const multiFilename = tracks.map(t => t.label).join(' + ');
                        setBatchResults([{ filename: multiFilename, status: 'processing' }]);
                        const transcriptId = await uploadMultiTrack();
                        const result = await processOneEpisode(null, transcriptId, true);
                        setBatchResults([{ filename: multiFilename, status: 'completed', downloadBlob: result.blob, transcriptId: result.transcriptId, review: result.review, editDecisions: result.editDecisions, fillerStats: result.fillerStats }]);
                        setPipelineStage('done');
                        setScreen('download');
                        return;
                    }

                    // Single-track (batch) flow
                    const isBatch = files.length > 1;
                    for (let i = 0; i < files.length; i++) {
                        setBatchIndex(i);
                        setBatchResults(prev => [...prev.slice(0, i), { filename: files[i].name, status: 'processing' }]);

                        try {
                            const result = await processOneEpisode(files[i]);
                            setBatchResults(prev => {
                                const next = [...prev];
                                next[i] = { filename: files[i].name, status: 'completed', downloadBlob: result.blob, transcriptId: result.transcriptId, review: result.review, editDecisions: result.editDecisions, fillerStats: result.fillerStats };
                                return next;
                            });
                        } catch (err) {
                            setBatchResults(prev => {
                                const next = [...prev];
                                next[i] = { filename: files[i].name, status: 'error', error: err.message || String(err) };
                                return next;
                            });
                            if (!isBatch) throw err;
                            // In batch mode, continue to next episode
                            console.error(`Batch episode ${i + 1} failed:`, err);
                        }
                    }

                    // All done
                    setPipelineStage('done');
                    setScreen('download');

                } catch (err) {
                    console.error('Pipeline error:', err);
                    const message = err.stage ? err.message :
                        (err instanceof TypeError ? 'Server unreachable — it may be restarting. Please retry.' :
                        err.message || 'An unexpected error occurred');
                    setPipelineError({
                        stage: err.stage || pipelineStage || 'uploading',
                        message
                    });
                }
            };

            const handleDownload = (blob, filename) => {
                const b = blob || downloadBlobRef.current;
                if (!b) return;
                const url = URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || 'edited_podcast.mp3';
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleTranscriptDownload = async (tid) => {
                const id = tid || transcriptIdRef.current;
                if (!id) return;
                try {
                    const res = await fetch(`${API_URL}/api/transcript-download/${id}`);
                    if (!res.ok) throw new Error('Failed to fetch transcript');
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'transcript.txt';
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    console.error('Transcript download error:', e);
                }
            };

            const handleDownloadAll = () => {
                batchResults.forEach(r => {
                    if (r.status === 'completed' && r.downloadBlob) {
                        const baseName = r.filename.replace(/\.[^.]+$/, '');
                        handleDownload(r.downloadBlob, `${baseName}_edited.mp3`);
                    }
                });
            };

            const handleGenerateShowNotes = async (tid) => {
                const id = tid || transcriptIdRef.current;
                if (!id) return;
                setShowNotesLoading(true);
                setShowNotes(null);
                try {
                    const res = await fetch(`${API_URL}/api/show-notes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transcript_id: id }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to start show notes');
                    const jobId = data.job_id;

                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        const pollRes = await fetch(`${API_URL}/api/show-notes-status/${jobId}`);
                        const pollData = await pollRes.json();
                        if (pollData.status === 'completed') {
                            setShowNotes(pollData.show_notes);
                            break;
                        }
                        if (!pollRes.ok) throw new Error(pollData.error || 'Show notes generation failed');
                    }
                } catch (e) {
                    console.error('Show notes error:', e);
                    setShowNotes(`Error: ${e.message}`);
                } finally {
                    setShowNotesLoading(false);
                }
            };

            const handleGenerateShowNotesFromText = async (text) => {
                if (!text.trim()) return;
                setShowNotesLoading(true);
                setShowNotes(null);
                try {
                    const res = await fetch(`${API_URL}/api/show-notes-from-text`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transcript_text: text, custom_instructions: customInstructions }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to start show notes');
                    const jobId = data.job_id;

                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        const pollRes = await fetch(`${API_URL}/api/show-notes-status/${jobId}`);
                        const pollData = await pollRes.json();
                        if (pollData.status === 'completed') {
                            setShowNotes(pollData.show_notes);
                            break;
                        }
                        if (!pollRes.ok) throw new Error(pollData.error || 'Show notes generation failed');
                    }
                } catch (e) {
                    console.error('Show notes from text error:', e);
                    setShowNotes(`Error: ${e.message}`);
                } finally {
                    setShowNotesLoading(false);
                }
            };

            const handleTranscriptFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setTranscriptText(ev.target.result);
                reader.readAsText(file);
            };

            const copyShowNotes = () => {
                if (showNotes) navigator.clipboard.writeText(showNotes);
            };

            const downloadShowNotes = async () => {
                if (!showNotes) return;
                const { Document, Paragraph, TextRun, HeadingLevel, Packer } = window.docx;

                const children = [];
                for (const line of showNotes.split('\n')) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;

                    if (trimmed.startsWith('### ')) {
                        children.push(new Paragraph({ text: trimmed.slice(4), heading: HeadingLevel.HEADING_3 }));
                    } else if (trimmed.startsWith('## ')) {
                        children.push(new Paragraph({ text: trimmed.slice(3), heading: HeadingLevel.HEADING_2 }));
                    } else if (trimmed.startsWith('# ')) {
                        children.push(new Paragraph({ text: trimmed.slice(2), heading: HeadingLevel.HEADING_1 }));
                    } else if (trimmed.startsWith('- ')) {
                        const bulletText = trimmed.slice(2);
                        // Parse bold segments: **text**
                        const parts = bulletText.split(/(\*\*.+?\*\*)/g);
                        const runs = parts.filter(Boolean).map(p =>
                            p.startsWith('**') && p.endsWith('**')
                                ? new TextRun({ text: p.slice(2, -2), bold: true })
                                : new TextRun(p)
                        );
                        children.push(new Paragraph({ children: runs, bullet: { level: 0 } }));
                    } else {
                        // Regular paragraph — parse bold
                        const parts = trimmed.split(/(\*\*.+?\*\*)/g);
                        const runs = parts.filter(Boolean).map(p =>
                            p.startsWith('**') && p.endsWith('**')
                                ? new TextRun({ text: p.slice(2, -2), bold: true })
                                : new TextRun(p)
                        );
                        children.push(new Paragraph({ children: runs }));
                    }
                }

                const doc = new Document({
                    sections: [{ children }],
                });

                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'show_notes.docx';
                a.click();
                URL.revokeObjectURL(url);
            };

            const resetToUpload = () => {
                setScreen('upload');
                setPipelineStage(null);
                setPipelineProgress(null);
                setPipelineError(null);
                setFiles([]);
                setTracks([]);
                setIntroFile(null);
                setOutroFile(null);
                if (!selectedProfile) {

                setBatchResults([]);

                setFillerAssessment(null);

                                    </button>
                                </div>

                                {uploadMode === 'single' ? (
                                    <>
                                        {/* Drop zone (multi-file) */}

                                </div>

                                {/* Filler assessment UI */}
                                {fillerAssessment && (
                                    <div className="mt-4 bg-purple-500/10 border border-purple-500/30 rounded-xl p-5">
                                        <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-3">Filler Assessment</h3>
                                        <div className="grid grid-cols-3 gap-3 mb-4">
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Total Fillers</p>
                                                <p className="text-white text-lg font-semibold">{fillerAssessment.total_fillers}</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Per Minute</p>
                                                <p className="text-white text-lg font-semibold">{fillerAssessment.fillers_per_minute}</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Duration</p>
                                                <p className="text-white text-lg font-semibold">{fillerAssessment.duration_minutes}m</p>
                                            </div>
                                        </div>
                                        {fillerAssessment.by_type && Object.keys(fillerAssessment.by_type).length > 0 && (
                                            <div className="flex flex-wrap gap-1.5 mb-4">
                                                {Object.entries(fillerAssessment.by_type)
                                                    .sort((a, b) => b[1] - a[1])
                                                    .map(([word, count]) => (
                                                        <span key={word} className="bg-white/10 border border-white/20 text-purple-200 text-xs px-2 py-1 rounded-full">
                                                            {word} <span className="text-purple-300/60">{count}</span>
                                                        </span>
                                                    ))}
                                            </div>
                                        )}
                                        <p className="text-purple-300/70 text-xs mb-3">
                                            {fillerAssessment.fillers_per_minute < 1 ? 'Low filler density — conservative removal recommended.' :
                                             fillerAssessment.fillers_per_minute < 3 ? 'Moderate filler density — standard removal.' :
                                             fillerAssessment.fillers_per_minute < 5 ? 'High filler density — more aggressive removal recommended.' :
                                             'Very high filler density — aggressive removal recommended.'}
                                        </p>
                                        <div className="mb-3">
                                            <label className="block text-xs text-purple-300/70 mb-1">Filler removal %</label>
                                            <input
                                                type="number"
                                                min="0" max="100" step="5"
                                                value={fillerAssessment.chosenPct ?? fillerAssessment.suggested_pct}
                                                onChange={e => setFillerAssessment(prev => ({
                                                    ...prev,
                                                    chosenPct: Math.max(0, Math.min(100, parseInt(e.target.value) || 0))
                                                }))}
                                                className="w-24 p-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm text-center"
                                            />
                                        </div>
                                        <div className="flex gap-2 mb-4">
                                            {[40, 60, 75, 85].map(pct => (
                                                <button
                                                    key={pct}
                                                    onClick={() => setFillerAssessment(prev => ({ ...prev, chosenPct: pct }))}
                                                    className={`text-xs px-3 py-1.5 rounded border transition-all ${
                                                        (fillerAssessment.chosenPct ?? fillerAssessment.suggested_pct) === pct
                                                            ? 'bg-purple-500/20 border-purple-400 text-purple-200'
                                                            : 'bg-white/5 border-white/10 text-purple-300/60 hover:bg-white/10'
                                                    }`}
                                                >
                                                    {pct}%{pct === fillerAssessment.suggested_pct ? ' (suggested)' : ''}
                                                </button>
                                            ))}
                                        </div>
                                        <button
                                            onClick={() => fillerAssessment.resolve(fillerAssessment.chosenPct ?? fillerAssessment.suggested_pct)}
                                            className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Sparkles className="w-4 h-4" />
                                            Continue to Analysis
                                        </button>
                                    </div>
                                )}

                                {/* Enhance approval UI */}
                                {enhanceApproval && (
                                    <div className="mt-4 bg-purple-500/10 border border-purple-500/30 rounded-xl p-5">
                                        <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-3">Audio Analysis</h3>
                                        <div className="grid grid-cols-3 gap-3 mb-4">
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Noise Floor</p>
                                                <p className="text-white text-sm font-mono">{enhanceApproval.analysis.noise_floor_db} dB</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Loudness</p>
                                                <p className="text-white text-sm font-mono">{enhanceApproval.analysis.integrated_lufs} LUFS</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3 text-center">
                                                <p className="text-purple-300/60 text-xs mb-1">Duration</p>
                                                <p className="text-white text-sm font-mono">{Math.floor(enhanceApproval.analysis.duration_s / 60)}:{String(Math.floor(enhanceApproval.analysis.duration_s % 60)).padStart(2, '0')}</p>
                                            </div>
                                        </div>
                                        <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-3">
                                            Adobe Enhance Mix
                                            <span className="font-normal normal-case text-purple-300/70 ml-1">
                                                ({enhanceApproval.adjustedMix.speech}/{enhanceApproval.adjustedMix.background}/{enhanceApproval.adjustedMix.music})
                                            </span>
                                        </h3>
                                        <div className="grid grid-cols-3 gap-3">
                                            {[
                                                { key: 'speech', label: 'Speech' },
                                                { key: 'background', label: 'Background' },
                                                { key: 'music', label: 'Music' },
                                            ].map(({ key, label }) => (
                                                <div key={key}>
                                                    <label className="block text-xs text-purple-300/70 mb-1">{label}</label>
                                                    <input
                                                        type="number"
                                                        min="0" max="100" step="5"
                                                        value={enhanceApproval.adjustedMix[key]}
                                                        onChange={e => setEnhanceApproval(prev => ({
                                                            ...prev,
                                                            adjustedMix: { ...prev.adjustedMix, [key]: Math.max(0, Math.min(100, parseInt(e.target.value) || 0)) }
                                                        }))}
                                                        className="w-full p-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm text-center"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 mt-2 mb-4">
                                            {[
                                                { label: '90/10/10', s: 90, b: 10, m: 10 },
                                                { label: '40/10/10', s: 40, b: 10, m: 10 },
                                                { label: '100/0/0', s: 100, b: 0, m: 0 },
                                            ].map(p => (
                                                <button
                                                    key={p.label}
                                                    onClick={() => setEnhanceApproval(prev => ({
                                                        ...prev,
                                                        adjustedMix: { speech: p.s, background: p.b, music: p.m }
                                                    }))}
                                                    className={`text-xs px-2 py-1 rounded border transition-all ${
                                                        enhanceApproval.adjustedMix.speech === p.s && enhanceApproval.adjustedMix.background === p.b && enhanceApproval.adjustedMix.music === p.m
                                                            ? 'bg-purple-500/20 border-purple-400 text-purple-200'
                                                            : 'bg-white/5 border-white/10 text-purple-300/60 hover:bg-white/10'
                                                    }`}
                                                >
                                                    {p.label}
                                                </button>
                                            ))}
                                        </div>
                                        <button
                                            onClick={() => enhanceApproval.resolve(enhanceApproval.adjustedMix)}
                                            className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Sparkles className="w-4 h-4" />
                                            Accept & Enhance
                                        </button>
                                    </div>
                                )}

                                {/* Error card */}
                                {pipelineError && (
                                    <div className="mt-6 bg-red-500/10 border border-red-500/50 rounded-xl p-5">
                                        <p className="text-red-300 font-semibold text-sm mb-1">
                                            Pipeline stopped at: {pipelineError.stage}
                                        </p>
                                        <p className="text-red-200/70 text-xs font-mono break-all mb-4">
                                            {pipelineError.message}
                                        </p>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => { setPipelineError(null); runFullPipeline(); }}
                                                className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
                                            >
                                                Retry from start
                                            </button>
                                            <button
                                                onClick={resetToUpload}
                                                className="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
                                            >
                                                Back to upload
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Screen 3: Download */}
                        {screen === 'download' && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl border border-white/20 p-8">
                                <div className="text-center">
                                    <div className="w-16 h-16 mx-auto mb-4 text-green-400">
                                        <CheckCircle className="w-16 h-16" />
                                    </div>
                                    {batchResults.length > 1 ? (
                                        <div>
                                            <h2 className="text-2xl font-bold text-white mb-2">
                                                Your podcasts are ready ({batchResults.filter(r => r.status === 'completed').length} of {batchResults.length})
                                            </h2>
                                            <p className="text-purple-200 mb-6">Batch processing complete.</p>
                                        </div>
                                    ) : (
                                        <div>
                                            <h2 className="text-2xl font-bold text-white mb-2">Your podcast is ready</h2>
                                            <p className="text-purple-200 mb-6">All editing stages completed successfully.</p>
                                        </div>
                                    )}
                                </div>

                                {/* Batch results list */}
                                {batchResults.length > 1 ? (
                                    <div className="space-y-2 mb-6">
                                        {batchResults.map((r, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-white/5 rounded-lg px-4 py-3 border border-white/10">
                                                <span className="text-purple-300/50 text-sm w-5 text-right">{i + 1}.</span>
                                                <span className={`flex-1 truncate text-sm ${r.status === 'completed' ? 'text-white' : r.status === 'error' ? 'text-red-300' : 'text-white/50'}`}>
                                                    {r.filename}
                                                </span>
                                                {r.status === 'error' && <span className="text-red-400/70 text-xs truncate max-w-[120px]">{r.error}</span>}
                                                {r.status === 'completed' && (
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => handleDownload(r.downloadBlob, r.filename.replace(/\.[^.]+$/, '') + '_edited.mp3')}
                                                            className="text-xs bg-green-500/20 text-green-300 px-3 py-1.5 rounded-lg hover:bg-green-500/30 transition-all"
                                                        >
                                                            Download
                                                        </button>
                                                        <button
                                                            onClick={() => handleGenerateShowNotes(r.transcriptId)}
                                                            disabled={showNotesLoading}
                                                            className="text-xs bg-purple-500/20 text-purple-300 px-3 py-1.5 rounded-lg hover:bg-purple-500/30 transition-all disabled:opacity-50"
                                                        >
                                                            Show Notes
                                                        </button>
                                                        {r.editDecisions?.length > 0 && (
                                                            <button
                                                                onClick={() => setShowEditsIndex(showEditsIndex === i ? null : i)}
                                                                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${showEditsIndex === i ? 'bg-purple-500/30 text-white' : 'bg-white/10 text-purple-300 hover:bg-white/20'}`}
                                                            >
                                                                Edits
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        <div className="flex justify-center gap-3 mt-4">
                                            <button
                                                onClick={handleDownloadAll}
                                                className="bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold py-3 px-6 rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all flex items-center gap-2"
                                            >
                                                <Download className="w-4 h-4" />
                                                Download All
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col sm:flex-row items-center justify-center gap-3 mb-6">
                                        <button
                                            onClick={() => {
                                                const r = batchResults[0];
                                                handleDownload(r?.downloadBlob || downloadBlobRef.current);
                                            }}
                                            className="bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold py-4 px-8 rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Download className="w-5 h-5" />
                                            Download Edited Audio
                                        </button>
                                        <button
                                            onClick={() => handleTranscriptDownload(batchResults[0]?.transcriptId)}
                                            className="bg-white/10 border border-white/20 text-white font-semibold py-4 px-8 rounded-xl hover:bg-white/20 transition-all flex items-center justify-center gap-2"
                                        >
                                            <FileAudio className="w-5 h-5" />
                                            Download Transcript
                                        </button>
                                        <button
                                            onClick={() => handleGenerateShowNotes(batchResults[0]?.transcriptId)}
                                            disabled={showNotesLoading}
                                            className="bg-white/10 border border-white/20 text-white font-semibold py-4 px-8 rounded-xl hover:bg-white/20 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                        >
                                            <Sparkles className="w-5 h-5" />
                                            {showNotesLoading ? 'Generating...' : 'Generate Show Notes'}
                                        </button>
                                        {batchResults[0]?.editDecisions?.length > 0 && (
                                            <button
                                                onClick={() => setShowEditsIndex(showEditsIndex === 0 ? null : 0)}
                                                className={`border font-semibold py-4 px-8 rounded-xl transition-all flex items-center justify-center gap-2 ${showEditsIndex === 0 ? 'bg-purple-500/20 border-purple-400 text-white' : 'bg-white/10 border-white/20 text-white hover:bg-white/20'}`}
                                            >
                                                {showEditsIndex === 0 ? 'Hide Edits' : 'View Edits'}
                                            </button>
                                        )}
                                    </div>
                                )}

                                {/* Audio quality review */}
                                {(() => {
                                    const review = batchResults[0]?.review;
                                    if (!review) return null;
                                    const m = review.metrics;
                                    const formatDuration = (s) => {
                                        const h = Math.floor(s / 3600);
                                        const min = Math.floor((s % 3600) / 60);
                                        const sec = Math.floor(s % 60);
                                        return h > 0 ? `${h}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${min}:${String(sec).padStart(2,'0')}`;
                                    };
                                    const warnings = review.issues.filter(i => i.severity === 'warning');
                                    const infos = review.issues.filter(i => i.severity === 'info');
                                    return (
                                        <div className={`mb-4 rounded-xl border p-4 ${review.passed ? 'bg-green-500/10 border-green-500/30' : 'bg-yellow-500/10 border-yellow-500/30'}`}>
                                            <div className="flex items-center gap-2 mb-2">
                                                {review.passed ? (
                                                    <CheckCircle className="w-4 h-4 text-green-400" />
                                                ) : (
                                                    <AlertCircle className="w-4 h-4 text-yellow-400" />
                                                )}
                                                <span className={`text-sm font-semibold ${review.passed ? 'text-green-300' : 'text-yellow-300'}`}>
                                                    {review.passed ? 'Quality check passed' : 'Quality check: warnings'}
                                                </span>
                                            </div>
                                            <p className="text-purple-200/70 text-xs">
                                                {m.integrated_lufs.toFixed(1)} LUFS &middot; {m.true_peak_dbtp.toFixed(1)} dBTP peak &middot; {m.loudness_range_lu.toFixed(1)} LU range &middot; {formatDuration(m.duration_s)}
                                            </p>
                                            {warnings.length > 0 && (
                                                <div className="mt-2 space-y-1">
                                                    {warnings.map((w, i) => (
                                                        <p key={i} className="text-yellow-300/80 text-xs">{w.description}</p>
                                                    ))}
                                                </div>
                                            )}
                                            {infos.length > 0 && (
                                                <div className="mt-2 space-y-1">
                                                    {infos.map((inf, i) => (
                                                        <p key={i} className="text-purple-300/60 text-xs">{inf.description}</p>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}

                                {/* Edit decisions panel */}
                                {showEditsIndex != null && (() => {
                                    const decisions = batchResults[showEditsIndex]?.editDecisions || [];
                                    if (decisions.length === 0) return null;
                                    const formatMs = (ms) => {
                                        const totalSec = Math.floor(ms / 1000);
                                        const min = Math.floor(totalSec / 60);
                                        const sec = totalSec % 60;
                                        return `${min}:${String(sec).padStart(2, '0')}`;
                                    };
                                    const types = ['Remove Filler', 'Trim Pause', 'Content Cut', 'Note'];
                                    const grouped = {};
                                    types.forEach(t => { grouped[t] = []; });
                                    decisions.forEach(d => {
                                        const key = types.includes(d.type) ? d.type : 'Note';
                                        grouped[key].push(d);
                                    });
                                    const summary = types
                                        .filter(t => grouped[t].length > 0)
                                        .map(t => `${grouped[t].length} ${t.toLowerCase()}${grouped[t].length !== 1 ? 's' : ''}`)
                                        .join(', ');
                                    const confidenceColor = (c) => c >= 90 ? 'bg-green-500/20 text-green-300' : c >= 70 ? 'bg-yellow-500/20 text-yellow-300' : 'bg-red-500/20 text-red-300';
                                    return (
                                        <div className="mb-4 bg-white/5 rounded-xl border border-white/10 p-4">
                                            <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-1">Edit Decisions</h3>
                                            {(() => {
                                                const fs = batchResults[showEditsIndex]?.fillerStats;
                                                if (!fs || !fs.total) return null;
                                                return <p className="text-purple-200 text-xs mb-1">{fs.removed} of {fs.total} fillers removed ({fs.pct_used}%)</p>;
                                            })()}
                                            <p className="text-purple-300/70 text-xs mb-3">{decisions.length} edits: {summary}</p>
                                            <div className="max-h-72 overflow-y-auto space-y-4 pr-1">
                                                {types.filter(t => grouped[t].length > 0).map(type => (
                                                    <div key={type}>
                                                        <p className="text-xs font-semibold text-purple-200/80 mb-1.5">{type}</p>
                                                        <div className="space-y-1">
                                                            {grouped[type].map((d, j) => (
                                                                <div key={j} className="bg-white/5 rounded-lg px-3 py-2 text-xs">
                                                                    <div className="flex items-center gap-2">
                                                                        {d.start_ms != null && (
                                                                            <span className="text-purple-300/60 font-mono shrink-0">{formatMs(d.start_ms)}{d.end_ms != null ? ` \u2013 ${formatMs(d.end_ms)}` : ''}</span>
                                                                        )}
                                                                        <span className="text-white flex-1 truncate">{d.description}</span>
                                                                        <span className={`shrink-0 px-1.5 py-0.5 rounded text-[10px] font-semibold ${confidenceColor(d.confidence)}`}>{d.confidence}%</span>
                                                                    </div>
                                                                    {d.rationale && <p className="text-purple-300/50 mt-0.5">{d.rationale}</p>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* Show notes display */}
                                {(showNotes || showNotesLoading) && (
                                    <div className="mb-4">
                                        {showNotesLoading && !showNotes && (
                                            <div className="flex items-center gap-2 text-purple-300 text-sm justify-center py-4">
                                                <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                                </svg>
                                                Generating show notes...
                                            </div>
                                        )}
                                        {showNotes && (
                                            <div>
                                                <div className="flex items-center justify-between mb-2">
                                                    <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide">Show Notes</h3>
                                                    <div className="flex gap-2">
                                                        <button onClick={copyShowNotes} className="text-xs text-purple-300 hover:text-white transition-all">Copy</button>
                                                        <button onClick={downloadShowNotes} className="text-xs text-purple-300 hover:text-white transition-all">Download</button>
                                                    </div>
                                                </div>
                                                <pre className="bg-black/20 rounded-lg border border-white/10 p-4 text-purple-100 text-sm whitespace-pre-wrap max-h-80 overflow-y-auto">{showNotes}</pre>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="text-center">
                                    <button
                                        onClick={resetToUpload}
                                        className="text-purple-300 hover:text-white text-sm transition-all"
                                    >
                                        {batchResults.length > 1 ? 'Edit another batch' : 'Edit another episode'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PodcastEditor />);
    </script>
</body>
</html>
