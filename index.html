<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Podcast Editor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Icons
        const UploadIcon = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const CheckCircle = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const AlertCircle = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const FileAudio = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.5 22h.5a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v3"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <path d="M10 20v-1a2 2 0 1 1 4 0v1a2 2 0 1 1-4 0Z"></path>
                <path d="M6 20v-1a2 2 0 1 0-4 0v1a2 2 0 1 0 4 0Z"></path>
                <path d="M2 19v-3a6 6 0 0 1 12 0v3"></path>
            </svg>
        );

        const Sparkles = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
                <path d="M5 3v4"></path>
                <path d="M19 17v4"></path>
                <path d="M3 5h4"></path>
                <path d="M17 19h4"></path>
            </svg>
        );

        const Download = ({className}) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const API_URL = 'https://ai-podcast-editor-production.up.railway.app';

        const STAGES = [
            { key: 'uploading',    label: 'Uploading audio' },
            { key: 'transcribing', label: 'Transcribing with AssemblyAI' },
            { key: 'detecting',    label: 'Detecting preset...' },
            { key: 'analyzing',    label: 'Analysing with Claude AI' },
            { key: 'cutting',      label: 'Applying edits' },
            { key: 'merging',      label: 'Merging intro & outro' },
            { key: 'enhancing',    label: 'Enhancing with Adobe Enhance Speech' },
            { key: 'finalizing',   label: 'Finalizing audio' },
            { key: 'done',         label: 'Complete' },
        ];

        function PodcastEditor() {
            const [screen, setScreen] = useState('upload');
            const [files, setFiles] = useState([]);
            const [introFile, setIntroFile] = useState(null);
            const [outroFile, setOutroFile] = useState(null);
            const [preset, setPreset] = useState('auto');
            const [customInstructions, setCustomInstructions] = useState('');
            const [pipelineStage, setPipelineStage] = useState(null);
            const [pipelineError, setPipelineError] = useState(null);
            const [enhanceUploading, setEnhanceUploading] = useState(false);
            const [finalizing, setFinalizing] = useState(false);
            const downloadBlobRef = useRef(null);
            const transcriptIdRef = useRef(null);
            const editJobIdRef = useRef(null);

            // Batch state
            const [batchIndex, setBatchIndex] = useState(0);
            const [batchResults, setBatchResults] = useState([]);

            // Show notes state
            const [showNotes, setShowNotes] = useState(null);
            const [showNotesLoading, setShowNotesLoading] = useState(false);

            // Show profiles state
            const [profiles, setProfiles] = useState(() => {
                try { return JSON.parse(localStorage.getItem('showProfiles') || '[]'); }
                catch { return []; }
            });
            const [selectedProfile, setSelectedProfile] = useState(null);
            const [showProfileManager, setShowProfileManager] = useState(false);
            const [editingProfileName, setEditingProfileName] = useState(null);

            useEffect(() => {
                localStorage.setItem('showProfiles', JSON.stringify(profiles));
            }, [profiles]);

            const selectProfile = (profile) => {
                setSelectedProfile(profile.id);
                setPreset(profile.preset);
                setCustomInstructions(profile.customInstructions || '');
            };

            const saveProfile = () => {
                const name = prompt('Show name:');
                if (!name) return;
                const newProfile = {
                    id: crypto.randomUUID(),
                    name,
                    preset,
                    customInstructions,
                    createdAt: Date.now(),
                };
                setProfiles(prev => [...prev, newProfile]);
                setSelectedProfile(newProfile.id);
            };

            const deleteProfile = (id) => {
                setProfiles(prev => prev.filter(p => p.id !== id));
                if (selectedProfile === id) setSelectedProfile(null);
            };

            const renameProfile = (id, newName) => {
                if (!newName) return;
                setProfiles(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
                setEditingProfileName(null);
            };

            const handleFileUpload = (e) => {
                const uploaded = Array.from(e.target.files).filter(f => f.type.includes('audio'));
                if (uploaded.length > 0) setFiles(prev => [...prev, ...uploaded]);
            };

            const removeFile = (index) => {
                setFiles(prev => prev.filter((_, i) => i !== index));
            };

            const processOneEpisode = async (file) => {
                setPipelineError(null);
                setPipelineStage('uploading');

                // Stage 1: Upload
                const formData = new FormData();
                formData.append('file', file);
                const uploadRes = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
                if (!uploadRes.ok) {
                    const err = await uploadRes.json();
                    throw { stage: 'uploading', message: err.error || 'Upload failed' };
                }
                const uploadData = await uploadRes.json();
                const { transcript_id, filename } = uploadData;
                transcriptIdRef.current = transcript_id;

                // Stage 2: Transcribe (poll)
                setPipelineStage('transcribing');
                while (true) {
                    await new Promise(r => setTimeout(r, 5000));
                    let statusRes;
                    try { statusRes = await fetch(`${API_URL}/api/transcription-status/${transcript_id}`); }
                    catch { throw { stage: 'transcribing', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                    const statusData = await statusRes.json();
                    if (statusData.status === 'completed') break;
                    if (statusData.status === 'error') {
                        throw { stage: 'transcribing', message: statusData.error || 'Transcription failed' };
                    }
                }

                // Stage 3: Claude analysis (with frontend-level retry on overload)
                setPipelineStage('analyzing');
                let editDecisions = [];
                let resolvedPreset = preset;
                let lastError = '';
                const analysisBody = JSON.stringify({
                    transcript_id,
                    filename,
                    preset,
                    customInstructions
                });

                for (let analysisAttempt = 0; analysisAttempt < 3; analysisAttempt++) {
                    const processRes = await fetch(`${API_URL}/api/process`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: analysisBody
                    });
                    const processData = await processRes.json();
                    if (!processRes.ok) throw { stage: 'analyzing', message: processData.error || 'Analysis failed to start' };
                    const analysisJobId = processData.job_id;
                    if (!analysisJobId) throw { stage: 'analyzing', message: 'No job_id returned' };

                    let retryable = false;
                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        let pollRes;
                        try { pollRes = await fetch(`${API_URL}/api/process-status/${analysisJobId}`); }
                        catch { throw { stage: 'analyzing', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                        if (pollRes.status === 404) throw { stage: 'analyzing', message: 'Server restarted during processing. Please retry.' };
                        const pollData = await pollRes.json();
                        if (!pollRes.ok) {
                            console.error(`Analysis poll error (${pollRes.status}):`, pollData);
                            if (pollData.retryable) { lastError = pollData.error || 'API overloaded'; retryable = true; break; }
                            throw { stage: 'analyzing', message: pollData.error || 'Analysis failed' };
                        }
                        if (pollData.status === 'detecting') setPipelineStage('detecting');
                        if (pollData.status === 'analyzing') setPipelineStage('analyzing');
                        if (pollData.success) {
                            editDecisions = pollData.edit_decisions || [];
                            if (pollData.detected_preset) {
                                resolvedPreset = pollData.detected_preset;
                                console.log(`Auto-detected preset: ${resolvedPreset}`, pollData.detection_metrics);
                            }
                            break;
                        }
                    }
                    if (editDecisions.length > 0 || !retryable) break;
                    if (analysisAttempt < 2) {
                        console.log(`Claude API error, frontend retry ${analysisAttempt + 1}/3 in 30s: ${lastError}`);
                        await new Promise(r => setTimeout(r, 30000));
                    }
                }
                if (editDecisions.length === 0) throw { stage: 'analyzing', message: lastError || 'No edit decisions were generated. Try again or adjust your recording type.' };

                // Stage 4: Apply cuts (+ optional intro/outro merge) → auto-enhance or manual enhance
                setPipelineStage('cutting');
                const cuts = editDecisions.filter(d => d.start_ms != null && d.end_ms != null);
                const editFormData = new FormData();
                editFormData.append('transcript_id', transcript_id);
                editFormData.append('cuts', JSON.stringify(cuts));
                editFormData.append('preset', resolvedPreset);
                if (introFile) editFormData.append('intro', introFile);
                if (outroFile) editFormData.append('outro', outroFile);
                const editRes = await fetch(`${API_URL}/api/edit-audio`, {
                    method: 'POST',
                    body: editFormData
                });
                const editData = await editRes.json();
                if (!editRes.ok) throw { stage: 'cutting', message: editData.error || 'Edit job failed to start' };
                const editJobId = editData.job_id;
                editJobIdRef.current = editJobId;

                let autoEnhanced = false;
                while (true) {
                    await new Promise(r => setTimeout(r, 3000));
                    let statusRes;
                    try { statusRes = await fetch(`${API_URL}/api/edit-audio-status/${editJobId}`); }
                    catch { throw { stage: 'cutting', message: 'Server unreachable — it may be restarting. Please retry.' }; }
                    if (statusRes.status === 404) throw { stage: 'cutting', message: 'Server restarted during processing. Please retry.' };
                    const statusData = await statusRes.json();
                    if (statusData.status === 'cutting')         setPipelineStage('cutting');
                    if (statusData.status === 'merging')         setPipelineStage('merging');
                    if (statusData.status === 'enhancing')       setPipelineStage('enhancing');
                    if (statusData.status === 'finalizing')      setPipelineStage('finalizing');
                    if (statusData.status === 'cuts_completed')  break;
                    if (statusData.status === 'completed') {
                        autoEnhanced = true;
                        break;
                    }
                    if (!statusRes.ok) {
                        throw { stage: statusData.failed_step || 'cutting', message: statusData.error || 'Audio processing failed' };
                    }
                }

                if (autoEnhanced) {
                    const dlRes = await fetch(`${API_URL}/api/edit-audio-download/${editJobId}`);
                    if (!dlRes.ok) {
                        const err = await dlRes.json();
                        throw { stage: 'finalizing', message: err.error || 'Download failed' };
                    }
                    return { blob: await dlRes.blob(), transcriptId: transcript_id, autoEnhanced: true };
                } else {
                    return { transcriptId: transcript_id, editJobId, autoEnhanced: false };
                }
            };

            const runFullPipeline = async () => {
                if (files.length === 0) return;
                setScreen('progress');
                setPipelineError(null);
                setBatchResults([]);
                const isBatch = files.length > 1;

                try {
                    for (let i = 0; i < files.length; i++) {
                        setBatchIndex(i);
                        setBatchResults(prev => [...prev.slice(0, i), { filename: files[i].name, status: 'processing' }]);

                        try {
                            const result = await processOneEpisode(files[i]);

                            if (result.autoEnhanced) {
                                setBatchResults(prev => {
                                    const next = [...prev];
                                    next[i] = { filename: files[i].name, status: 'completed', downloadBlob: result.blob, transcriptId: result.transcriptId };
                                    return next;
                                });
                            } else {
                                // Manual enhance path — for batch, this stops the whole batch at this episode
                                if (isBatch) {
                                    // Can't do manual enhance mid-batch; mark remaining as skipped
                                    setBatchResults(prev => {
                                        const next = [...prev];
                                        next[i] = { filename: files[i].name, status: 'needs_enhance', transcriptId: result.transcriptId, editJobId: result.editJobId };
                                        return next;
                                    });
                                    setPipelineStage('done');
                                    setScreen('enhance');
                                    return;
                                } else {
                                    setPipelineStage('done');
                                    setScreen('enhance');
                                    return;
                                }
                            }
                        } catch (err) {
                            setBatchResults(prev => {
                                const next = [...prev];
                                next[i] = { filename: files[i].name, status: 'error', error: err.message || String(err) };
                                return next;
                            });
                            if (!isBatch) throw err;
                            // In batch mode, continue to next episode
                            console.error(`Batch episode ${i + 1} failed:`, err);
                        }
                    }

                    // All done
                    setPipelineStage('done');
                    setScreen('download');

                } catch (err) {
                    console.error('Pipeline error:', err);
                    const message = err.stage ? err.message :
                        (err instanceof TypeError ? 'Server unreachable — it may be restarting. Please retry.' :
                        err.message || 'An unexpected error occurred');
                    setPipelineError({
                        stage: err.stage || pipelineStage || 'uploading',
                        message
                    });
                }
            };

            const handleDownloadIntermediate = async () => {
                const jobId = editJobIdRef.current;
                if (!jobId) return;
                const url = `${API_URL}/api/edit-audio-download/${jobId}`;
                const a = document.createElement('a');
                a.href = url;
                a.download = 'edited_podcast.wav';
                a.click();
            };

            const handleEnhancedUpload = async (e) => {
                const enhancedFile = e.target.files[0];
                if (!enhancedFile || !editJobIdRef.current) return;

                setEnhanceUploading(true);
                setPipelineError(null);

                try {
                    const formData = new FormData();
                    formData.append('file', enhancedFile);
                    formData.append('job_id', editJobIdRef.current);

                    const res = await fetch(`${API_URL}/api/upload-enhanced`, {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Upload failed');

                    // Poll for finalization
                    setFinalizing(true);
                    const jobId = editJobIdRef.current;
                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        let statusRes;
                        try { statusRes = await fetch(`${API_URL}/api/edit-audio-status/${jobId}`); }
                        catch { throw new Error('Server unreachable during finalization'); }
                        const statusData = await statusRes.json();
                        if (statusData.status === 'completed') break;
                        if (!statusRes.ok) {
                            throw new Error(statusData.error || 'Finalization failed');
                        }
                    }

                    // Download final MP3 blob
                    const dlRes = await fetch(`${API_URL}/api/edit-audio-download/${jobId}`);
                    if (!dlRes.ok) {
                        const err = await dlRes.json();
                        throw new Error(err.error || 'Download failed');
                    }
                    downloadBlobRef.current = await dlRes.blob();

                    setEnhanceUploading(false);
                    setFinalizing(false);
                    setScreen('download');

                } catch (err) {
                    console.error('Enhanced upload error:', err);
                    setEnhanceUploading(false);
                    setFinalizing(false);
                    setPipelineError({
                        stage: 'enhance',
                        message: err.message || 'Enhancement upload failed',
                    });
                }
            };

            const handleDownload = (blob, filename) => {
                const b = blob || downloadBlobRef.current;
                if (!b) return;
                const url = URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || 'edited_podcast.mp3';
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleTranscriptDownload = async (tid) => {
                const id = tid || transcriptIdRef.current;
                if (!id) return;
                try {
                    const res = await fetch(`${API_URL}/api/transcript-download/${id}`);
                    if (!res.ok) throw new Error('Failed to fetch transcript');
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'transcript.txt';
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    console.error('Transcript download error:', e);
                }
            };

            const handleDownloadAll = () => {
                batchResults.forEach(r => {
                    if (r.status === 'completed' && r.downloadBlob) {
                        const baseName = r.filename.replace(/\.[^.]+$/, '');
                        handleDownload(r.downloadBlob, `${baseName}_edited.mp3`);
                    }
                });
            };

            const handleGenerateShowNotes = async (tid) => {
                const id = tid || transcriptIdRef.current;
                if (!id) return;
                setShowNotesLoading(true);
                setShowNotes(null);
                try {
                    const res = await fetch(`${API_URL}/api/show-notes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transcript_id: id }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to start show notes');
                    const jobId = data.job_id;

                    while (true) {
                        await new Promise(r => setTimeout(r, 3000));
                        const pollRes = await fetch(`${API_URL}/api/show-notes-status/${jobId}`);
                        const pollData = await pollRes.json();
                        if (pollData.status === 'completed') {
                            setShowNotes(pollData.show_notes);
                            break;
                        }
                        if (!pollRes.ok) throw new Error(pollData.error || 'Show notes generation failed');
                    }
                } catch (e) {
                    console.error('Show notes error:', e);
                    setShowNotes(`Error: ${e.message}`);
                } finally {
                    setShowNotesLoading(false);
                }
            };

            const copyShowNotes = () => {
                if (showNotes) navigator.clipboard.writeText(showNotes);
            };

            const downloadShowNotes = () => {
                if (!showNotes) return;
                const blob = new Blob([showNotes], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'show_notes.md';
                a.click();
                URL.revokeObjectURL(url);
            };

            const resetToUpload = () => {
                setScreen('upload');
                setPipelineStage(null);
                setPipelineError(null);
                setFiles([]);
                setIntroFile(null);
                setOutroFile(null);
                if (!selectedProfile) {
                    setPreset('auto');
                    setCustomInstructions('');
                }
                setEnhanceUploading(false);
                setFinalizing(false);
                setBatchIndex(0);
                setBatchResults([]);
                setShowNotes(null);
                setShowNotesLoading(false);
                downloadBlobRef.current = null;
                transcriptIdRef.current = null;
                editJobIdRef.current = null;
            };

            // --- Render ---

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-6">
                    <div className="w-full max-w-2xl">

                        {/* Header */}
                        <div className="text-center mb-8">
                            <div className="flex items-center justify-center gap-3 mb-2">
                                <Sparkles className="text-purple-300" />
                                <h1 className="text-3xl font-bold text-white">AI Podcast Editor</h1>
                            </div>
                        </div>

                        {/* Screen 1: Upload */}
                        {screen === 'upload' && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl border border-white/20 p-8">
                                <h2 className="text-xl font-semibold text-white mb-6">Upload Episode</h2>

                                {/* Profile bar */}
                                <div className="flex items-center gap-2 mb-4 flex-wrap">
                                    {profiles.length > 0 && (
                                        <select
                                            value={selectedProfile || ''}
                                            onChange={e => {
                                                const p = profiles.find(p => p.id === e.target.value);
                                                if (p) selectProfile(p);
                                                else { setSelectedProfile(null); }
                                            }}
                                            className="bg-white/10 border border-white/20 text-white text-sm rounded-lg px-3 py-2 appearance-none cursor-pointer"
                                        >
                                            <option value="" className="bg-slate-800">No profile</option>
                                            {profiles.map(p => (
                                                <option key={p.id} value={p.id} className="bg-slate-800">{p.name}</option>
                                            ))}
                                        </select>
                                    )}
                                    <button
                                        onClick={saveProfile}
                                        className="text-xs bg-purple-500/20 border border-purple-400/40 text-purple-300 px-3 py-2 rounded-lg hover:bg-purple-500/30 transition-all"
                                    >
                                        + Save Profile
                                    </button>
                                    {profiles.length > 0 && (
                                        <button
                                            onClick={() => setShowProfileManager(!showProfileManager)}
                                            className="text-xs text-purple-300/60 hover:text-purple-300 px-2 py-2 transition-all"
                                        >
                                            Manage
                                        </button>
                                    )}
                                </div>

                                {/* Profile manager */}
                                {showProfileManager && profiles.length > 0 && (
                                    <div className="mb-4 bg-white/5 rounded-lg border border-white/10 p-3 space-y-2">
                                        {profiles.map(p => (
                                            <div key={p.id} className="flex items-center gap-2 text-sm">
                                                {editingProfileName === p.id ? (
                                                    <input
                                                        autoFocus
                                                        defaultValue={p.name}
                                                        onBlur={e => renameProfile(p.id, e.target.value)}
                                                        onKeyDown={e => { if (e.key === 'Enter') renameProfile(p.id, e.target.value); }}
                                                        className="flex-1 bg-white/10 border border-white/20 text-white px-2 py-1 rounded text-sm"
                                                    />
                                                ) : (
                                                    <span className="flex-1 text-white truncate">{p.name}</span>
                                                )}
                                                <span className="text-purple-300/50 text-xs">{p.preset}</span>
                                                <button onClick={() => setEditingProfileName(p.id)} className="text-purple-300/60 hover:text-purple-300 text-xs transition-all">Rename</button>
                                                <button onClick={() => deleteProfile(p.id)} className="text-red-400/60 hover:text-red-400 text-xs transition-all">Delete</button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Drop zone (multi-file) */}
                                <div className="border-2 border-dashed border-purple-400/50 rounded-xl p-8 text-center mb-4 bg-white/5 hover:bg-white/10 transition-all cursor-pointer">
                                    <input type="file" accept="audio/*" multiple onChange={handleFileUpload} className="hidden" id="file-upload" />
                                    <label htmlFor="file-upload" className="cursor-pointer">
                                        <div className="w-12 h-12 mx-auto mb-3 text-purple-300 flex items-center justify-center">
                                            <FileAudio />
                                        </div>
                                        <div>
                                            <p className="text-white font-semibold mb-1">Drop your podcast files here</p>
                                            <p className="text-purple-200 text-sm">or click to browse (multiple files supported)</p>
                                        </div>
                                    </label>
                                </div>

                                {/* File list */}
                                {files.length > 0 && (
                                    <div className="mb-4 space-y-1">
                                        {files.map((f, i) => (
                                            <div key={i} className="flex items-center gap-2 bg-white/5 rounded-lg px-3 py-2 text-sm">
                                                <span className="text-purple-300/50 w-5 text-right">{i + 1}.</span>
                                                <span className="text-white flex-1 truncate">{f.name}</span>
                                                <span className="text-purple-300/50 text-xs">{(f.size / 1024 / 1024).toFixed(1)} MB</span>
                                                <button onClick={() => removeFile(i)} className="text-red-400/50 hover:text-red-400 text-xs transition-all">x</button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Intro / Outro (optional) */}
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <div>
                                        <input type="file" accept="audio/*" onChange={e => setIntroFile(e.target.files[0] || null)} className="hidden" id="intro-upload" />
                                        <label htmlFor="intro-upload" className="block cursor-pointer border border-dashed border-white/20 rounded-lg p-3 text-center hover:bg-white/5 transition-all">
                                            {introFile ? (
                                                <div>
                                                    <p className="text-white text-sm font-medium truncate">{introFile.name}</p>
                                                    <p className="text-purple-300 text-xs">{(introFile.size / 1024 / 1024).toFixed(1)} MB</p>
                                                </div>
                                            ) : (
                                                <div>
                                                    <p className="text-purple-300 text-sm font-medium">Intro <span className="text-purple-300/50 font-normal">(optional)</span></p>
                                                </div>
                                            )}
                                        </label>
                                        {introFile && <button onClick={() => { setIntroFile(null); document.getElementById('intro-upload').value = ''; }} className="text-xs text-purple-300/60 hover:text-red-300 mt-1 transition-all">Remove</button>}
                                    </div>
                                    <div>
                                        <input type="file" accept="audio/*" onChange={e => setOutroFile(e.target.files[0] || null)} className="hidden" id="outro-upload" />
                                        <label htmlFor="outro-upload" className="block cursor-pointer border border-dashed border-white/20 rounded-lg p-3 text-center hover:bg-white/5 transition-all">
                                            {outroFile ? (
                                                <div>
                                                    <p className="text-white text-sm font-medium truncate">{outroFile.name}</p>
                                                    <p className="text-purple-300 text-xs">{(outroFile.size / 1024 / 1024).toFixed(1)} MB</p>
                                                </div>
                                            ) : (
                                                <div>
                                                    <p className="text-purple-300 text-sm font-medium">Outro <span className="text-purple-300/50 font-normal">(optional)</span></p>
                                                </div>
                                            )}
                                        </label>
                                        {outroFile && <button onClick={() => { setOutroFile(null); document.getElementById('outro-upload').value = ''; }} className="text-xs text-purple-300/60 hover:text-red-300 mt-1 transition-all">Remove</button>}
                                    </div>
                                </div>

                                {/* Preset selector */}
                                <div className="mb-6">
                                    <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-3">Recording Type</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button
                                            onClick={() => setPreset('auto')}
                                            className={`col-span-2 text-left p-4 rounded-xl border transition-all ${
                                                preset === 'auto'
                                                    ? 'bg-purple-500/20 border-purple-400'
                                                    : 'bg-white/5 border-white/10 hover:bg-white/10 hover:border-white/20'
                                            }`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className="text-lg">&#10024;</div>
                                                <div>
                                                    <div className="text-sm font-semibold text-white">Auto-Detect</div>
                                                    <div className="text-xs text-purple-300 mt-0.5">Analyses your audio and picks the best settings</div>
                                                </div>
                                            </div>
                                        </button>
                                        {[
                                            { key: 'studio', label: 'Studio Interview', desc: 'Clean audio, light editing', icon: '\uD83C\uDF99\uFE0F' },
                                            { key: 'zoom', label: 'Zoom / Remote', desc: 'Standard cleanup', icon: '\uD83D\uDCBB' },
                                            { key: 'solo', label: 'Solo Narration', desc: 'Aggressive filler removal', icon: '\uD83C\uDFA7' },
                                            { key: 'raw', label: 'Raw / Rough Cut', desc: 'Heavy cleanup all round', icon: '\uD83D\uDD27' },
                                        ].map(p => (
                                            <button
                                                key={p.key}
                                                onClick={() => setPreset(p.key)}
                                                className={`text-left p-4 rounded-xl border transition-all ${
                                                    preset === p.key
                                                        ? 'bg-purple-500/20 border-purple-400'
                                                        : 'bg-white/5 border-white/10 hover:bg-white/10 hover:border-white/20'
                                                }`}
                                            >
                                                <div className="text-lg mb-1">{p.icon}</div>
                                                <div className="text-sm font-semibold text-white">{p.label}</div>
                                                <div className="text-xs text-purple-300 mt-0.5">{p.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Custom instructions */}
                                <div className="mb-6">
                                    <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide mb-3">Custom Instructions <span className="font-normal normal-case text-purple-300/70">(optional)</span></h3>
                                    <textarea
                                        placeholder="e.g., Keep the banter between hosts, remove technical difficulties around 15:30..."
                                        value={customInstructions}
                                        onChange={e => setCustomInstructions(e.target.value)}
                                        className="w-full p-2.5 rounded-lg bg-white/10 border border-white/20 text-white placeholder-purple-300 text-sm h-24 resize-none"
                                    />
                                </div>

                                <button
                                    onClick={runFullPipeline}
                                    disabled={files.length === 0}
                                    className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-4 rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                                >
                                    <Sparkles className="w-5 h-5" />
                                    {files.length > 1 ? `Edit ${files.length} Episodes` : 'Edit Audio'}
                                </button>
                            </div>
                        )}

                        {/* Screen 2: Progress */}
                        {screen === 'progress' && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl border border-white/20 p-8">
                                <h2 className="text-xl font-semibold text-white mb-6">Editing in progress</h2>

                                {/* Batch progress indicator */}
                                {files.length > 1 && (
                                    <div className="mb-4 space-y-2">
                                        <p className="text-purple-200 text-sm font-medium">
                                            Episode {batchIndex + 1} of {files.length}: <span className="text-white">{files[batchIndex]?.name}</span>
                                        </p>
                                        <div className="space-y-1">
                                            {files.map((f, i) => {
                                                const result = batchResults[i];
                                                const isCurrent = i === batchIndex && (!result || result.status === 'processing');
                                                let icon, textColor;
                                                if (result?.status === 'completed') { icon = '\u2713'; textColor = 'text-green-400'; }
                                                else if (result?.status === 'error') { icon = '\u2717'; textColor = 'text-red-400'; }
                                                else if (isCurrent) { icon = '\u27F3'; textColor = 'text-white'; }
                                                else { icon = '\u25CB'; textColor = 'text-white/30'; }
                                                return (
                                                    <div key={i} className={`flex items-center gap-2 text-sm ${textColor}`}>
                                                        <span className="w-4 text-center">{icon}</span>
                                                        <span className="truncate">{f.name}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="h-px bg-white/10 my-2" />
                                    </div>
                                )}

                                <div className="space-y-2">
                                    {STAGES.map((stage, i) => {
                                        const currentIdx = STAGES.findIndex(s => s.key === pipelineStage);
                                        const failedStage = pipelineError && pipelineError.stage === stage.key;
                                        const done = !failedStage && currentIdx > i;
                                        const active = !failedStage && pipelineStage === stage.key && stage.key !== 'done';

                                        let icon, textColor, bgColor;
                                        if (failedStage) {
                                            icon = <AlertCircle className="w-5 h-5 text-red-400" />;
                                            textColor = 'text-red-300';
                                            bgColor = 'bg-red-500/15 border-red-500/40';
                                        } else if (done) {
                                            icon = <CheckCircle className="w-5 h-5 text-green-400" />;
                                            textColor = 'text-green-300';
                                            bgColor = 'bg-green-500/10 border-green-500/30';
                                        } else if (active) {
                                            icon = (
                                                <svg className="w-5 h-5 text-purple-400 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                                </svg>
                                            );
                                            textColor = 'text-white';
                                            bgColor = 'bg-purple-500/15 border-purple-500/40';
                                        } else {
                                            icon = <div className="w-5 h-5 rounded-full border-2 border-white/20" />;
                                            textColor = 'text-white/30';
                                            bgColor = 'bg-white/5 border-white/10';
                                        }

                                        return (
                                            <div key={stage.key} className={`flex items-center gap-3 rounded-lg px-4 py-3 border ${bgColor}`}>
                                                <div className="shrink-0">{icon}</div>
                                                <span className={`font-medium text-sm ${textColor}`}>{stage.label}</span>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Error card */}
                                {pipelineError && (
                                    <div className="mt-6 bg-red-500/10 border border-red-500/50 rounded-xl p-5">
                                        <p className="text-red-300 font-semibold text-sm mb-1">
                                            Pipeline stopped at: {pipelineError.stage}
                                        </p>
                                        <p className="text-red-200/70 text-xs font-mono break-all mb-4">
                                            {pipelineError.message}
                                        </p>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => { setPipelineError(null); runFullPipeline(); }}
                                                className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
                                            >
                                                Retry from start
                                            </button>
                                            <button
                                                onClick={resetToUpload}
                                                className="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
                                            >
                                                Back to upload
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Screen 3: Enhance */}
                        {screen === 'enhance' && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl border border-white/20 p-8">
                                <div className="flex items-center gap-3 mb-6">
                                    <CheckCircle className="w-6 h-6 text-green-400" />
                                    <h2 className="text-xl font-semibold text-white">Cuts complete — enhance your audio</h2>
                                </div>

                                <div className="space-y-6">
                                    {/* Step 1: Download */}
                                    <div className="bg-white/5 rounded-xl border border-white/10 p-5">
                                        <div className="flex items-start gap-3">
                                            <div className="w-7 h-7 rounded-full bg-purple-500/30 border border-purple-400/50 flex items-center justify-center text-purple-300 text-sm font-bold shrink-0">1</div>
                                            <div className="flex-1">
                                                <p className="text-white font-medium mb-2">Download the edited audio</p>
                                                <button
                                                    onClick={handleDownloadIntermediate}
                                                    className="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 px-6 rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all flex items-center gap-2"
                                                >
                                                    <Download className="w-4 h-4" />
                                                    Download WAV
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Step 2: Enhance externally */}
                                    <div className="bg-white/5 rounded-xl border border-white/10 p-5">
                                        <div className="flex items-start gap-3">
                                            <div className="w-7 h-7 rounded-full bg-purple-500/30 border border-purple-400/50 flex items-center justify-center text-purple-300 text-sm font-bold shrink-0">2</div>
                                            <div>
                                                <p className="text-white font-medium mb-1">Enhance with Adobe Enhance Speech</p>
                                                <p className="text-purple-200/70 text-sm">
                                                    Go to <span className="text-purple-300 font-mono">podcast.adobe.com/enhance</span> and upload the WAV file. Download the enhanced result when it finishes.
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Step 3: Upload enhanced */}
                                    <div className="bg-white/5 rounded-xl border border-white/10 p-5">
                                        <div className="flex items-start gap-3">
                                            <div className="w-7 h-7 rounded-full bg-purple-500/30 border border-purple-400/50 flex items-center justify-center text-purple-300 text-sm font-bold shrink-0">3</div>
                                            <div className="flex-1">
                                                <p className="text-white font-medium mb-2">Upload the enhanced file</p>
                                                {finalizing ? (
                                                    <div className="flex items-center gap-2 text-purple-300 text-sm">
                                                        <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                                        </svg>
                                                        Finalizing — converting to stereo MP3...
                                                    </div>
                                                ) : enhanceUploading ? (
                                                    <div className="flex items-center gap-2 text-purple-300 text-sm">
                                                        <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                                        </svg>
                                                        Uploading enhanced file...
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <input
                                                            type="file"
                                                            accept="audio/*"
                                                            onChange={handleEnhancedUpload}
                                                            className="hidden"
                                                            id="enhanced-upload"
                                                        />
                                                        <label
                                                            htmlFor="enhanced-upload"
                                                            className="inline-flex items-center gap-2 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold py-3 px-6 rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all cursor-pointer"
                                                        >
                                                            <UploadIcon className="w-4 h-4" />
                                                            Upload Enhanced Audio
                                                        </label>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Error card */}
                                {pipelineError && (
                                    <div className="mt-6 bg-red-500/10 border border-red-500/50 rounded-xl p-5">
                                        <p className="text-red-300 font-semibold text-sm mb-1">
                                            Error during enhancement
                                        </p>
                                        <p className="text-red-200/70 text-xs font-mono break-all">
                                            {pipelineError.message}
                                        </p>
                                    </div>
                                )}

                                <button
                                    onClick={resetToUpload}
                                    className="mt-6 text-purple-300 hover:text-white text-sm transition-all"
                                >
                                    Start over
                                </button>
                            </div>
                        )}

                        {/* Screen 4: Download */}
                        {screen === 'download' && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl border border-white/20 p-8">
                                <div className="text-center">
                                    <div className="w-16 h-16 mx-auto mb-4 text-green-400">
                                        <CheckCircle className="w-16 h-16" />
                                    </div>
                                    {batchResults.length > 1 ? (
                                        <div>
                                            <h2 className="text-2xl font-bold text-white mb-2">
                                                Your podcasts are ready ({batchResults.filter(r => r.status === 'completed').length} of {batchResults.length})
                                            </h2>
                                            <p className="text-purple-200 mb-6">Batch processing complete.</p>
                                        </div>
                                    ) : (
                                        <div>
                                            <h2 className="text-2xl font-bold text-white mb-2">Your podcast is ready</h2>
                                            <p className="text-purple-200 mb-6">All editing stages completed successfully.</p>
                                        </div>
                                    )}
                                </div>

                                {/* Batch results list */}
                                {batchResults.length > 1 ? (
                                    <div className="space-y-2 mb-6">
                                        {batchResults.map((r, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-white/5 rounded-lg px-4 py-3 border border-white/10">
                                                <span className="text-purple-300/50 text-sm w-5 text-right">{i + 1}.</span>
                                                <span className={`flex-1 truncate text-sm ${r.status === 'completed' ? 'text-white' : r.status === 'error' ? 'text-red-300' : 'text-white/50'}`}>
                                                    {r.filename}
                                                </span>
                                                {r.status === 'error' && <span className="text-red-400/70 text-xs truncate max-w-[120px]">{r.error}</span>}
                                                {r.status === 'completed' && (
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => handleDownload(r.downloadBlob, r.filename.replace(/\.[^.]+$/, '') + '_edited.mp3')}
                                                            className="text-xs bg-green-500/20 text-green-300 px-3 py-1.5 rounded-lg hover:bg-green-500/30 transition-all"
                                                        >
                                                            Download
                                                        </button>
                                                        <button
                                                            onClick={() => handleGenerateShowNotes(r.transcriptId)}
                                                            disabled={showNotesLoading}
                                                            className="text-xs bg-purple-500/20 text-purple-300 px-3 py-1.5 rounded-lg hover:bg-purple-500/30 transition-all disabled:opacity-50"
                                                        >
                                                            Show Notes
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        <div className="flex justify-center gap-3 mt-4">
                                            <button
                                                onClick={handleDownloadAll}
                                                className="bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold py-3 px-6 rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all flex items-center gap-2"
                                            >
                                                <Download className="w-4 h-4" />
                                                Download All
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col sm:flex-row items-center justify-center gap-3 mb-6">
                                        <button
                                            onClick={() => {
                                                const r = batchResults[0];
                                                handleDownload(r?.downloadBlob || downloadBlobRef.current);
                                            }}
                                            className="bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold py-4 px-8 rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Download className="w-5 h-5" />
                                            Download Edited Audio
                                        </button>
                                        <button
                                            onClick={() => handleTranscriptDownload(batchResults[0]?.transcriptId)}
                                            className="bg-white/10 border border-white/20 text-white font-semibold py-4 px-8 rounded-xl hover:bg-white/20 transition-all flex items-center justify-center gap-2"
                                        >
                                            <FileAudio className="w-5 h-5" />
                                            Download Transcript
                                        </button>
                                        <button
                                            onClick={() => handleGenerateShowNotes(batchResults[0]?.transcriptId)}
                                            disabled={showNotesLoading}
                                            className="bg-white/10 border border-white/20 text-white font-semibold py-4 px-8 rounded-xl hover:bg-white/20 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                        >
                                            <Sparkles className="w-5 h-5" />
                                            {showNotesLoading ? 'Generating...' : 'Generate Show Notes'}
                                        </button>
                                    </div>
                                )}

                                {/* Show notes display */}
                                {(showNotes || showNotesLoading) && (
                                    <div className="mb-4">
                                        {showNotesLoading && !showNotes && (
                                            <div className="flex items-center gap-2 text-purple-300 text-sm justify-center py-4">
                                                <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                                </svg>
                                                Generating show notes...
                                            </div>
                                        )}
                                        {showNotes && (
                                            <div>
                                                <div className="flex items-center justify-between mb-2">
                                                    <h3 className="text-sm font-semibold text-purple-200 uppercase tracking-wide">Show Notes</h3>
                                                    <div className="flex gap-2">
                                                        <button onClick={copyShowNotes} className="text-xs text-purple-300 hover:text-white transition-all">Copy</button>
                                                        <button onClick={downloadShowNotes} className="text-xs text-purple-300 hover:text-white transition-all">Download</button>
                                                    </div>
                                                </div>
                                                <pre className="bg-black/20 rounded-lg border border-white/10 p-4 text-purple-100 text-sm whitespace-pre-wrap max-h-80 overflow-y-auto">{showNotes}</pre>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="text-center">
                                    <button
                                        onClick={resetToUpload}
                                        className="text-purple-300 hover:text-white text-sm transition-all"
                                    >
                                        {batchResults.length > 1 ? 'Edit another batch' : 'Edit another episode'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PodcastEditor />);
    </script>
</body>
</html>
